# Deploy the FastAPI backend on Render with environment-controlled startup loading.
services:
  - type: web
    name: hire-sight-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATA_LOAD_ON_STARTUP
        value: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:8000
